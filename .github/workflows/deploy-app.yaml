name: Build and Deploy App

on:
    push:
        branches: [main]
        paths:
            - "cmd/**"
            - "internal/**"
            - "web/**"
            - "Dockerfile"
            - "go.mod"
            - "go.sum"

env:
    AWS_REGION: us-west-2
    HELM_REPO: slikk66/eks-helm
    HELM_PATH: prod/newspin/deployment.yaml

permissions:
    id-token: write
    contents: read

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
                  aws-region: us-west-2

            - name: Login to ECR
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build and push image
              run: |
                  IMAGE_TAG=${GITHUB_SHA::7}
                  ECR_REPO=${{ vars.ECR_REPO }}
                  docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest .
                  docker push $ECR_REPO:$IMAGE_TAG
                  docker push $ECR_REPO:latest
                  echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
                  echo "ECR_REPO=$ECR_REPO" >> $GITHUB_ENV

            - name: Update Helm repo
              run: |
                  git clone https://x-access-token:${{ secrets.HELM_REPO_TOKEN }}@github.com/$HELM_REPO.git helm-repo
                  cd helm-repo
                  sed -i "s|image: .*newspin-newspin:.*|image: $ECR_REPO:$IMAGE_TAG|" $HELM_PATH
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git add .
                  git commit -m "deploy newspin $IMAGE_TAG"
                  git push
